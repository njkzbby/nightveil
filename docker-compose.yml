services:
  nightveil:
    build: .
    container_name: nightveil
    restart: unless-stopped
    ports:
      - "443:443"
      - "443:443/udp"
    volumes:
      - nightveil-data:/etc/nightveil

volumes:
  nightveil-data:

# Usage:
#
# First time setup (interactive):
#   docker compose run --rm nightveil nv setup
#   docker compose up -d
#
# Add user:
#   docker compose exec nightveil nv adduser "Friend"
#
# Show import link:
#   docker compose exec nightveil nv link
#
# List users:
#   docker compose exec nightveil nv users
#
# Rebuild:
#   docker compose build --no-cache && docker compose up -d
