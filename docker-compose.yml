services:
  nightveil:
    build: .
    container_name: nightveil
    restart: unless-stopped
    ports:
      - "${NV_PORT:-443}:${NV_PORT:-443}"
      - "${NV_PORT:-443}:${NV_PORT:-443}/udp"
    volumes:
      - nightveil-data:/etc/nightveil

volumes:
  nightveil-data:

# NV_PORT is auto-set by "nv setup" in .env file.
#
# Usage:
#   docker compose run --rm nightveil nv setup    # first time
#   docker compose up -d                          # start
#   docker compose exec nightveil nv adduser "X"  # add user
#   docker compose exec nightveil nv link         # show links
#   docker compose exec nightveil nv users        # list users
