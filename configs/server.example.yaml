server:
  listen: "0.0.0.0:443"

  tls:
    cert_file: "/etc/nightveil/cert.pem"
    key_file: "/etc/nightveil/key.pem"
    # REALITY mode (future):
    # dest: "google.com:443"

  auth:
    private_key: "REPLACE_WITH_BASE64_PRIVATE_KEY"
    max_time_diff: 120
    # Per-user keys (recommended):
    users:
      - short_id: "REPLACE"
        public_key: "REPLACE_WITH_USER_PUBLIC_KEY"
        name: "User 1"
    # Legacy (shortID-only, no per-user keys):
    # short_ids:
    #   - "abcdef01"

  transport:
    type: "xhttp"
    max_chunk_size: 14336
    session_timeout: 30

  middleware:
    - type: "padding"
      min_bytes: 64
      max_bytes: 256

  fallback:
    mode: "default"

  # Management API (optional):
  # api:
  #   enabled: true
  #   listen: "127.0.0.1:9090"
  #   secret: "your-secret"
