client:
  inbound:
    type: "socks5"
    listen: "127.0.0.1:10809"

  server:
    address: "your-server.com:443"

  auth:
    server_public_key: "REPLACE_WITH_SERVER_PUBLIC_KEY"
    user_private_key: "REPLACE_WITH_YOUR_PRIVATE_KEY"
    short_id: "REPLACE"

  transport:
    type: "xhttp"
    # Per-client unique params (from keygen):
    path_prefix: "/REPLACE"
    upload_path: "/u/REPLACE"
    download_path: "/d/REPLACE"
    session_key_name: "REPLACE"
    max_chunk_size: 14336

  tls:
    fingerprint: "chrome"
    # SNI — what domain name DPI sees in TLS handshake.
    # Default: same as server address.
    # REALITY mode: set to the site your server impersonates.
    # Examples: "google.com", "microsoft.com", "apple.com"
    # sni: "google.com"
    # skip_verify: true        # for self-signed certs or REALITY

  middleware:
    - type: "padding"
      min_bytes: 64
      max_bytes: 256

  anti_throttle:
    enabled: true
    detect_rtt_spike_ms: 500
    detect_throughput_drop_pct: 70
    response: "both"
