client:
  inbound:
    type: "socks5"
    listen: "127.0.0.1:1080"

  server:
    address: "your-domain.com:443"

  auth:
    server_public_key: "REPLACE_WITH_BASE64_PUBLIC_KEY"
    short_id: "REPLACE_WITH_SHORT_ID"

  transport:
    type: "xhttp"
    # Per-client unique params (generated by `nv keygen`)
    path_prefix: "/x7k2m9"
    upload_path: "/u/p3q"
    download_path: "/d/r8w"
    session_key_name: "cf_tok"
    max_chunk_size: 14336

  tls:
    fingerprint: "chrome"

  middleware:
    - type: "padding"
      min_bytes: 64
      max_bytes: 256

  anti_throttle:
    enabled: true
    detect_rtt_spike_ms: 500
    detect_throughput_drop_pct: 70
    response: "multiply"
